services:
  # ── Your MCP tool server ──
  # Replace with your actual MCP server image.
  # Bound to the internal network only — not exposed to the host.
  mcp:
    image: your-mcp-server:latest  # TODO: replace with your image
    # build: ./path/to/your/mcp-server
    networks:
      - hesed-net
    expose:
      - "3000"
    # Not published to host — only reachable via hesed

  # ── Hesed security sidecar ──
  # All agent traffic goes through here.
  hesed:
    build: .
    volumes:
      - ./config.docker.toml:/app/config.toml:ro
    ports:
      - "8080:8080"
    networks:
      - hesed-net
    depends_on:
      - mcp
    environment:
      - RUST_LOG=hesed=info

networks:
  hesed-net:
    driver: bridge
