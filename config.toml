mode = "dynamic"

[server]
# agent_id defaults to a random UUID if not set

[upstream]
command = "/path/to/your/mcp-server"

# Rules (authz, dlp, hitl) are pulled from the central dashboard.
# No static rules here — the dashboard is the single source of truth.

[breaker]
requests_per_second = 50
burst_size = 100

[audit]
enabled = true
sink = "stdout"

[heartbeat]
central_url = "https://poimen.astapa.com"
interval_secs = 30
# api_key = "hsk_..."  # set in config-local.toml (gitignored)
